name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Remove custom domain from GitHub Pages settings
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CONFIG=$(gh api "repos/${{ github.repository }}/pages" 2>/dev/null || echo '{}')
          CNAME=$(echo "$CONFIG" | jq -r '.cname // empty')
          if [ -z "$CNAME" ]; then
            echo "No custom domain configured in GitHub Pages settings."
            exit 0
          fi
          echo "Removing custom domain from settings: $CNAME"
          BUILD_TYPE=$(echo "$CONFIG" | jq -r '.build_type // "workflow"')
          if [ "$BUILD_TYPE" = "legacy" ]; then
            BRANCH=$(echo "$CONFIG" | jq -r '.source.branch // "main"')
            PATH_DIR=$(echo "$CONFIG" | jq -r '.source.path // "/"')
            gh api --method PUT "repos/${{ github.repository }}/pages" \
              -f build_type=legacy \
              -f "source[branch]=$BRANCH" \
              -f "source[path]=$PATH_DIR" \
              -f cname=
          else
            gh api --method PUT "repos/${{ github.repository }}/pages" \
              -f build_type=workflow \
              -f cname=
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare site artifact
        run: |
          set -euo pipefail
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='CNAME' \
            ./ _site/
          rm -f _site/CNAME
          test -f _site/index.html
          if [ -e _site/CNAME ]; then
            echo "CNAME must not be included in the Pages artifact."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
